[tools]
# cargo-binstall must be present for the cargo: tools below to install as prebuilt
# binaries: the `cargo.binstall` setting only uses it "if available". Without it mise
# falls back to `cargo install` and compiles them from source (~8 min on a cold
# Windows runner). The aqua backend fetches a prebuilt binstall, and mise sequences
# it before the cargo: tools so binstall is ready when they install.
"aqua:cargo-bins/cargo-binstall" = "1.19.1"
# rustfmt/clippy must be requested explicitly or rustup uses the minimal profile.
# llvm-tools-preview (needed only by cargo-llvm-cov) is intentionally omitted here so
# the per-OS `app` jobs don't pull it; the coverage-only `core` CI job adds it via
# `rustup component add` — see mise.coverage.toml.
rust = { version = "1.96.0", components = "rustfmt,clippy" }
"cargo:cargo-nextest" = "0.9.137"

[settings]
# Prefer binary fetch via cargo-binstall when available (faster installs).
cargo.binstall = true

[tasks.check-docs]
description = "Verify the L1/L2/L3 documentation structure (CLAUDE.md <=35 lines + all doc links resolve)"
run = "bash scripts/check-docs.sh"

[tasks.check-tokens]
description = "Guard against raw color hex outside Theme.slint in crates/gashuu/ui/*.slint (DESIGN.md single-source-of-truth rule)"
run = "bash scripts/check-tokens.sh"
