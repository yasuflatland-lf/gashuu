coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flags:
  rust:
    paths:
      - crates/gashuu-core

ignore:
  # Trailing /** so this does NOT prefix-match crates/gashuu-core (codecov's
  # ignore patterns are start-anchored only, so bare "crates/gashuu" would
  # swallow the measured core crate too and yield 0% / "unknown" coverage).
  - "crates/gashuu/**"
  - "**/build.rs"
  - "**/tests/**"

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
