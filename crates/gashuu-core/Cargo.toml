[package]
name = "gashuu-core"
version = "0.1.0"
edition = "2021"

[dependencies]
image = "0.25"
walkdir = "2"
thiserror = "2"
lru = "0.18"
rayon = "1"
# Enabled only via the `testing` feature so downstream crates (gashuu) can use the
# generated MockPageSource in their tests without pulling mockall into release builds.
mockall = { version = "0.14", optional = true }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
directories = "6.0.0"

[dev-dependencies]
insta = "1.47.2"
tempfile = "3"

[features]
testing = ["dep:mockall"]
