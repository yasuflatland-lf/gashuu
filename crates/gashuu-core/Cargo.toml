[package]
name = "gashuu-core"
version = "0.1.0"
edition = "2021"

[dependencies]
image = "0.25"
walkdir = "2"
thiserror = "2"
lru = "0.12"
rayon = "1"
# Enabled only via the `testing` feature so downstream crates (gashuu) can use the
# generated MockPageSource in their tests without pulling mockall into release builds.
mockall = { version = "0.13", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
testing = ["dep:mockall"]
