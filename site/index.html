<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gashuu - Fast, elegant manga / comic reader</title>
    <meta name="description" content="gashuu is a fast, elegant manga / comic reader for immersive viewing." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: Inter, "Noto Sans JP", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-serif: "Noto Serif JP", ui-serif, Georgia, serif;
        /* Aesop-style palette: washi cream + sumi ink, near-monochrome.
           The only chroma is the gashuu seal red, used as a 落款 one-point. */
        --color-cream: #fffef2;     /* page background; text on dark surfaces (never #fff) */
        --color-cream-alt: #faf9ee; /* faint surface differentiation, used sparingly */
        --color-ink: #333333;       /* body, headings, primary button fill (never #000) */
        --color-ink2: #666666;      /* supporting copy, leads */
        --color-ink3: #9b9b95;      /* kickers, captions, disabled */
        --color-line: #ced4da;      /* hairline rules, frames, dividers */
        --color-seal: #e42a24;      /* SEAL red — logo + footer 角印 only; never on CTAs */
      }

      /*
        Typography — Aesop literary minimalism, rendered for Japanese.
        - Headings: Noto Serif JP (mincho), weight 500; hierarchy by SIZE, not weight.
        - Body / UI / Latin: Inter + Noto Sans JP, weight 400/500.
        - Spacing: べた組み (full-width metrics). palt is OFF and letter-spacing is
          normal — punctuation breathes the traditional way. The only positive
          tracking is the uppercase kicker label. Headings open a hair (+0.02em).
        - Leading is generous (book rhythm): hero ~1.42, section ~1.45, body ~1.9.
        - Geometry: square corners everywhere, no drop shadows; depth comes from
          cream/ink surface contrast and 1px hairlines only.
      */
      @layer base {
        html {
          font-size: 16px;
          text-rendering: optimizeLegibility;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
        body {
          line-height: 1.9;
          letter-spacing: 0;
          /* palt OFF — no forced proportional metrics; full-width べた組み rhythm. */
          font-feature-settings: normal;
          font-kerning: normal;
          text-wrap: pretty;
        }
      }

      @layer utilities {
        /* — Type tiers — */
        .type-kicker {
          /* The only positively-tracked element (uppercase Latin label). */
          font-size: clamp(0.66rem, 0.63rem + 0.12vw, 0.72rem);
          line-height: 1;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          font-weight: 500;
        }
        .type-nav {
          font-size: clamp(0.8rem, 0.78rem + 0.1vw, 0.85rem);
          line-height: 1.3;
          letter-spacing: 0;
          font-weight: 500;
        }
        .type-hero {
          font-family: var(--font-serif);
          font-weight: 500;
          font-size: clamp(1.875rem, 1.1rem + 3.4vw, 2.75rem);
          line-height: 1.42;
          letter-spacing: 0.02em;
        }
        .type-section {
          font-family: var(--font-serif);
          font-weight: 500;
          font-size: clamp(1.5rem, 1.28rem + 0.9vw, 1.75rem);
          line-height: 1.45;
          letter-spacing: 0.02em;
        }
        .type-card-title {
          font-family: var(--font-serif);
          font-weight: 500;
          font-size: 1.125rem;
          line-height: 1.6;
          letter-spacing: 0.01em;
        }
        .type-lead {
          font-size: clamp(0.95rem, 0.92rem + 0.15vw, 1.0625rem);
          line-height: 1.8;
          letter-spacing: 0;
          font-weight: 400;
        }
        .type-body {
          font-size: clamp(0.875rem, 0.86rem + 0.08vw, 0.9375rem);
          line-height: 1.9;
          letter-spacing: 0;
          font-weight: 400;
        }
        /* — Measure: comfortable centered line length (~30 JP chars). — */
        .measure { max-width: 34rem; }
        /* — Whitespace ladder (Aesop scale: 12 / 24 / 32 / 40 / 64 px). Tight
             within a group, wide between groups. — */
        .rhythm-12 { margin-top: 0.75rem; }
        .rhythm-24 { margin-top: 1.5rem; }
        .rhythm-32 { margin-top: 2rem; }
        .rhythm-40 { margin-top: 2.5rem; }
        .rhythm-64 { margin-top: 4rem; }
      }
    </style>
  </head>
  <body class="bg-cream text-ink antialiased selection:bg-seal selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useRef } = React;

      // Small uppercase label — the page's only positively-tracked type and, by
      // default, the quietest ink. No pill, no border: Aesop sets labels in plain
      // tracked caps.
      function Kicker({ children, className = '' }) {
        return <p className={`type-kicker text-ink3 ${className}`}>{children}</p>;
      }

      // Square, shadowless buttons. Primary is sumi-filled; secondary is a hairline
      // outline. The seal red is deliberately NOT used here — buttons stay ink so the
      // red reads as a signature, not an action color.
      function Button({ children, variant = 'primary', href = '#download' }) {
        const base = "type-nav inline-flex items-center justify-center px-6 py-3 transition-colors";
        const styles = variant === 'primary'
          ? "bg-ink text-cream border border-ink hover:bg-[#1f1e1c]"
          : "bg-transparent text-ink border border-ink/25 hover:border-ink";
        return <a href={href} className={`${base} ${styles}`}>{children}</a>;
      }

      // A centered video showcase: heading + lead above a framed, autoplaying loop.
      // The clip plays muted with no chrome (apple.com-style); it starts only when
      // scrolled into view and pauses when out, and falls back to a poster + manual
      // controls under prefers-reduced-motion. The frame is square with a single
      // hairline border — no rounding, no shadow.
      function VideoSection({ kicker, title, lead, src, poster, alt, ratio }) {
        const videoRef = useRef(null);
        useEffect(() => {
          const v = videoRef.current;
          if (!v) return;
          // `muted` is set imperatively: a muted JSX prop does not reliably set the
          // DOM property, and muting is required for autoplay to be permitted.
          v.muted = true;
          if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            // Honor reduced motion: no autoplay; expose controls over the poster.
            v.removeAttribute('autoplay');
            v.setAttribute('controls', '');
            v.pause();
            return;
          }
          // Play only while on screen; pause when scrolled away.
          const io = new IntersectionObserver(
            (entries) => entries.forEach((e) => (e.isIntersecting ? v.play().catch(() => {}) : v.pause())),
            { threshold: 0.25 }
          );
          io.observe(v);
          return () => io.disconnect();
        }, []);
        return (
          <section className="mx-auto max-w-[1000px] px-6 py-[4rem] md:px-10 md:py-[6rem]">
            <div className="mx-auto measure text-center">
              <Kicker>{kicker}</Kicker>
              <h2 className="type-section rhythm-24 text-balance">{title}</h2>
              <p className="type-lead rhythm-24 text-pretty text-ink2">{lead}</p>
            </div>
            <div className="rhythm-40 mx-auto w-full max-w-4xl">
              <div className="relative overflow-hidden border border-line bg-black" style={{ aspectRatio: ratio }}>
                <video
                  ref={videoRef}
                  autoPlay
                  muted
                  loop
                  playsInline
                  preload="metadata"
                  poster={poster}
                  aria-label={alt}
                  className="absolute inset-0 h-full w-full object-cover"
                >
                  <source src={src} type="video/mp4" />
                </video>
              </div>
            </div>
          </section>
        );
      }

      const features = [
        ['IMPORT', 'どんな漫画も', 'フォルダもCBZ/ZIP/CBR/RARも自動判定。中身を見て適切に読み込みます。'],
        ['READ', '気持ちよく読む', '単ページ/見開き/Auto、RTL/LTR、フィットを作品ごとに記憶。キャッシュとプリロードでテンポよくめくれます。'],
        ['RETURN', '続きへ戻る', '進捗、最近読んだ本、最後のページを保存。サムネイルやスクラブで探したい場面にもすぐ戻れます。']
      ]

      function App() {
        return (
          <div className="overflow-hidden">
            <header className="fixed inset-x-0 top-0 z-50 border-b border-line bg-cream/90 backdrop-blur">
              <nav className="mx-auto grid max-w-[1000px] grid-cols-[1fr_auto_1fr] items-center px-6 py-4 md:px-10">
                <a href="#" className="flex items-center gap-3 justify-self-start">
                  <img src="assets/logo.png" alt="gashuu app icon" className="h-8 w-8 object-contain" />
                  <span className="type-nav text-ink">gashuu</span>
                </a>
                <div className="type-nav hidden items-center gap-8 text-ink2 md:flex md:justify-self-center">
                  <a href="#workflow" className="transition-colors hover:text-ink">機能</a>
                  <a href="https://github.com/yasuflatland-lf/gashuu/releases" className="transition-colors hover:text-ink">Download</a>
                  <a href="#faq" className="transition-colors hover:text-ink">FAQ</a>
                </div>
                <div className="hidden md:block justify-self-end" aria-hidden="true"></div>
              </nav>
            </header>

            <section className="px-6 pt-[6rem] pb-[4rem] md:px-10 md:pt-[9rem] md:pb-[6rem]">
              <div className="mx-auto max-w-[1000px] text-center">
                <Kicker>Desktop manga reader</Kicker>
                <h1 className="type-hero rhythm-24 text-balance">
                  漫画を、<wbr />美しく読む。
                </h1>
                <p className="type-lead mx-auto rhythm-32 measure text-pretty text-ink2">
                  gashuuは、高解像度コミックを軽快に読むためのデスクトップビューア。フォルダもアーカイブも、見開きもRTLも、作品ごとの読み心地も記憶。
                </p>
                <div className="rhythm-40 flex flex-col justify-center gap-3 sm:flex-row">
                  <Button href="https://github.com/yasuflatland-lf/gashuu/releases">Get gashuu</Button>
                  <Button variant="secondary" href="https://github.com/yasuflatland-lf/gashuu">View on GitHub →</Button>
                </div>
                <p className="type-nav rhythm-32 font-normal text-ink3">Open source · MIT License · 画集 / gashuu</p>
              </div>
            </section>

            <VideoSection
              kicker="Library"
              title="本棚を、流れるように。"
              lead="読み込んだ漫画は、そのままカバーフローへ。何百冊あっても、表紙を滑らせるように軽快に探せます。"
              src="assets/carousel_demo.mp4"
              poster="assets/carousel_demo-poster.jpg"
              alt="gashuuのライブラリで表紙のカバーフローをページ送りするデモ"
              ratio="946 / 634"
            />

            <section className="px-6 py-[4rem] md:px-10 md:py-[7.5rem]" id="workflow">
              <div className="mx-auto max-w-[1000px]">
                <div className="mx-auto measure text-center">
                  <Kicker>Reading flow</Kicker>
                  <h2 className="type-section rhythm-24 text-balance">開いて、整えて、続きへ。</h2>
                  <p className="type-lead rhythm-24 text-pretty text-ink2">
                    フォルダもアーカイブも自然に本棚へ。作品ごとの設定を記憶するので、次に開けば昨日のページからすぐ戻れます。
                  </p>
                </div>
                <div className="rhythm-64 grid sm:grid-cols-3">
                  {features.map((f, i) => (
                    <div key={f[1]} className={`px-2 text-center sm:px-8 ${i > 0 ? 'mt-10 border-t border-line pt-10 sm:mt-0 sm:border-l sm:border-t-0 sm:pt-0' : ''}`}>
                      <Kicker>{f[0]}</Kicker>
                      <h3 className="type-card-title rhythm-24">{f[1]}</h3>
                      <p className="type-body rhythm-12 text-ink2">{f[2]}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <VideoSection
              kicker="Reader"
              title="高精細を、軽やかに。"
              lead="拡大してもくっきり精細。見開きもRTLも、なめらかなページ送りで読みに没頭できます。"
              src="assets/view_demo.mp4"
              poster="assets/view_demo-poster.jpg"
              alt="gashuuのビューアで高解像度の漫画をなめらかに読むデモ"
              ratio="900 / 634"
            />

            <section className="px-6 py-[4rem] md:px-10 md:py-[6rem]" id="pricing">
              <div className="mx-auto max-w-[1000px] border border-line">
                <div className="grid lg:grid-cols-[1fr_360px]">
                  <div className="p-8 md:p-14">
                    <Kicker>Open source desktop app</Kicker>
                    <h2 className="type-section rhythm-24 text-balance">無料で使える。</h2>
                    <p className="type-lead rhythm-24 measure text-pretty text-ink2">gashuuはMITライセンスのオープンソース。まずは使って、要望はGitHubのIssueやPRで。</p>
                  </div>
                  <div className="border-t border-line bg-cream-alt p-8 md:p-10 lg:border-l lg:border-t-0">
                    <h3 className="type-card-title">gashuu Desktop</h3>
                    <div className="rhythm-12 font-serif text-[clamp(2.5rem,2rem+2vw,3.25rem)] font-medium leading-none">¥0</div>
                    <ul className="rhythm-32 type-body space-y-3 text-ink2">
                      <li className="flex gap-3"><span className="text-ink3" aria-hidden="true">—</span>Mac / Windows / Linux</li>
                      <li className="flex gap-3"><span className="text-ink3" aria-hidden="true">—</span>フォルダ &amp; コミックアーカイブ</li>
                      <li className="flex gap-3"><span className="text-ink3" aria-hidden="true">—</span>見開き / RTL / ズーム / サムネイル</li>
                      <li className="flex gap-3"><span className="text-ink3" aria-hidden="true">—</span>日本語 / 英語UI</li>
                    </ul>
                    <a id="download" href="https://github.com/yasuflatland-lf/gashuu/releases" className="rhythm-40 type-nav inline-flex w-full justify-center border border-ink bg-ink px-6 py-3 text-cream transition-colors hover:bg-[#1f1e1c]">Download release</a>
                  </div>
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-[760px] px-6 py-[4rem] md:px-10 md:py-[6rem]" id="faq">
              <Kicker className="text-center">Support</Kicker>
              <h2 className="type-section rhythm-24 text-center text-balance">FAQ</h2>
              <div className="rhythm-40 border-t border-line">
                {[
                  ['どんな形式に対応していますか？', '画像フォルダ、PNG/JPG/JPEG/AVIF、CBZ/ZIP/CBR/RARアーカイブを想定しています。'],
                  ['漫画の右綴じで読めますか？', 'はい。RTL/LTRを切り替えられ、矢印キーやスクラブの挙動も読み方向に合わせます。'],
                  ['設定は作品ごとに残りますか？', '読書方向、見開き、カバー配置、フィットモードは本ごとに保存できます。'],
                  ['重い画像でも安全ですか？', '巨大画像や展開爆弾を事前にチェックし、問題があればクラッシュではなくステータスで通知する設計です。']
                ].map(([q,a]) => <details key={q} className="group border-b border-line py-5"><summary className="type-nav flex cursor-pointer list-none items-center justify-between text-ink">{q}<span className="ml-4 text-ink3 transition-transform group-open:rotate-45">+</span></summary><p className="type-body rhythm-12 text-ink2">{a}</p></details>)}
              </div>
            </section>

            <footer className="bg-ink text-cream">
              <div className="mx-auto flex max-w-[1000px] flex-col justify-between gap-5 px-6 py-12 md:flex-row md:items-center md:px-10">
                <div className="flex items-center gap-3">
                  <img src="assets/logo.png" alt="gashuu app icon" className="h-7 w-7 object-contain" />
                  <span className="type-nav">gashuu</span>
                </div>
                <div className="type-body text-cream/55">Open source · MIT License · Copyright © 2026 Yasuyuki Takeo</div>
              </div>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
