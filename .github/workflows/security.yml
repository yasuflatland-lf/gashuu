name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-advisories:
    name: rust advisories and sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - run: cargo install cargo-audit --locked
      - run: cargo install cargo-deny --locked
      # Keep the exception explicit in CI as well as .cargo/audit.toml so
      # cargo-audit still suppresses this known transitive advisory even if
      # config discovery changes across cargo-audit releases.
      - run: cargo audit --ignore RUSTSEC-2024-0436
      - run: cargo deny check advisories sources
