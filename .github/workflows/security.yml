name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-advisories:
    name: rust advisories and sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
      - run: cargo install cargo-deny --locked
      # cargo-deny is the single source of truth for advisory exceptions: every
      # ignore lives once in deny.toml with a documented reason (previously the
      # same exceptions were duplicated across .cargo/audit.toml + this CLI +
      # deny.toml and drifted). `--deny advisory-not-detected` escalates a STALE
      # ignore (its crate has left the tree, so the exception is no longer needed)
      # from a warning to a hard failure — CI goes red the moment an ignore can be
      # removed, which is the forcing function to prune deny.toml.
      - run: cargo deny check advisories sources --deny advisory-not-detected
