name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  # Manual re-deploy seam: re-publish the current main without a site change.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages deployments must land in order; never cancel one mid-flight. At most one
# run waits per group — intermediate pushes are skipped, so the latest always deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy (github-pages)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      # The landing page is fully static (Tailwind v4 browser build + React via
      # CDN), so there is no build step: site/ is uploaded as-is.
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
