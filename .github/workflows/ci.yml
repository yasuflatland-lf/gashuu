name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel a superseded run when a new commit lands on the same ref (saves CI minutes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The Slint-free pure crate: lint + test + coverage in one fast ubuntu job.
  # It never links Slint, so the quality gates return quickly instead of waiting
  # on the GUI build, and gashuu-core is tested/measured exactly once.
  core:
    name: core (rust, slint-free)
    runs-on: ubuntu-latest
    # Activate mise.coverage.toml so cargo-llvm-cov is installed here only; the
    # per-OS app jobs (no MISE_ENV) skip it and stay lean. See mise.coverage.toml.
    env:
      MISE_ENV: coverage
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # gashuu-core's `image` dep decodes AVIF through the dav1d C library
      # (`avif-native` feature), resolved via pkg-config. Ubuntu 24.04 ships
      # 1.4.1 (>= the 1.3.0 floor). See docs/toolchain.md.
      - run: |
          sudo apt-get update
          sudo apt-get install -y libdav1d-dev
      # Install all three components explicitly on mise's pinned toolchain:
      # llvm-tools-preview (for cargo-llvm-cov; mise.toml omits it) plus rustfmt and
      # clippy. rustfmt/clippy ARE declared in mise.toml, but on a mise cache hit
      # jdx/mise-action restores symlinks WITHOUT re-running `rustup component add`,
      # so they can be missing from ~/.rustup on the runner — keep them here or
      # `cargo fmt --check`/clippy fail in this (coverage) job. Do not drop as "redundant".
      - run: rustup component add rustfmt clippy llvm-tools-preview
      - run: cargo fmt --check
      # `--features testing` so the feature-gated MockPageSource test is linted and run
      # (the old `--workspace` runs got it via feature unification with gashuu's dev-dep).
      - run: cargo clippy -p gashuu-core --all-targets --features testing -- -D warnings
      - run: cargo llvm-cov nextest -p gashuu-core --features testing --profile ci --lcov --output-path lcov.info --ignore-filename-regex 'build\.rs'
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  # Doc-structure harness: enforces the L1 (CLAUDE.md <=35 lines) + link integrity
  # invariants, plus the visual-token and macOS release packaging guards.
  # Pure bash, no toolchain — runs the same scripts as the local
  # `mise run check-docs` / `mise run check-tokens` /
  # `mise run check-release-macos-dist` tasks.
  docs:
    name: docs (structure check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: bash scripts/check-docs.sh
      - run: bash scripts/check-tokens.sh
      - run: bash scripts/check-release-macos-dist.sh

  # The Slint presentation crate, built and tested per OS. Only `-p gashuu` runs
  # here (the core job already covers gashuu-core), and fmt/clippy are not repeated
  # on every OS. clippy for the UI runs once on Linux.
  app:
    name: app (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Slint's winit + femtovg backend links these system libraries on Linux;
      # libdav1d-dev backs the image crate's AVIF decode (avif-native feature).
      - if: runner.os == 'Linux'
        name: Install system libraries + dav1d (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libfreetype6-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libdav1d-dev
      # dav1d for the non-Linux legs. The SYSTEM_DEPS_* env overrides point the
      # dav1d-sys build directly at the library, bypassing pkg-config (not
      # reliably on PATH on these runners). See docs/toolchain.md.
      - if: runner.os == 'macOS'
        name: Install dav1d (brew)
        run: |
          brew install dav1d
          PREFIX="$(brew --prefix dav1d)"
          {
            echo "SYSTEM_DEPS_DAV1D_NO_PKG_CONFIG=1"
            echo "SYSTEM_DEPS_DAV1D_LIB=dav1d"
            echo "SYSTEM_DEPS_DAV1D_SEARCH_NATIVE=$PREFIX/lib"
            echo "SYSTEM_DEPS_DAV1D_INCLUDE=$PREFIX/include"
          } >> "$GITHUB_ENV"
      # vcpkg compiles dav1d from source on a cold cache (~5-8 min); the archives
      # cache makes warm runs take seconds. Static lib: no DLL needed at test time.
      - if: runner.os == 'Windows'
        name: Cache vcpkg-built dav1d
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-dav1d-x64-windows-static-md
      - if: runner.os == 'Windows'
        name: Install dav1d (vcpkg, static)
        shell: pwsh
        run: |
          vcpkg install dav1d:x64-windows-static-md
          $root = "$Env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          @(
            "SYSTEM_DEPS_DAV1D_NO_PKG_CONFIG=1",
            "SYSTEM_DEPS_DAV1D_LINK=static",
            "SYSTEM_DEPS_DAV1D_LIB=dav1d",
            "SYSTEM_DEPS_DAV1D_SEARCH_NATIVE=$root\lib",
            "SYSTEM_DEPS_DAV1D_INCLUDE=$root\include"
          ) | Out-File -FilePath $Env:GITHUB_ENV -Append
      - run: rustup component add clippy
      # UI lint once (Linux leg); add per-OS clippy only when cfg(os) code appears.
      - if: matrix.os == 'ubuntu-latest'
        run: cargo clippy -p gashuu --all-targets -- -D warnings
      - run: cargo nextest run -p gashuu --profile ci
