name: Release

# Build the macOS (universal) and Windows (x86_64) executables and attach them
# as zips to the GitHub Release for the tag. The Release must already exist
# (create it first via the GitHub UI or `gh release create <tag> ...`); this
# workflow only uploads assets to it, it does not create the release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach assets to (e.g. v0.1.0)'
        required: true
        type: string

# Do NOT cancel an in-progress release — re-triggering mid-run could leave a
# release with a partial set of assets.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Default all release jobs to read-only; only publish needs write access.
permissions:
  contents: read

jobs:
  # Fail fast (before any minutes are spent on the slow per-OS builds) if the
  # tag does not match the crate version, so a mistyped tag never ships.
  preflight:
    name: preflight (version gate)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - id: resolve
        name: Resolve the tag and assert it matches Cargo.toml
        shell: bash
        env:
          # Pass interpolated values through env (never inline into the script).
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          # Require the `v` prefix so a bare `0.1.0` dispatch can't pass the gate
          # and then fail later at `gh release view v0.1.0`.
          if [ "${TAG#v}" = "$TAG" ]; then
            echo "::error::Tag must start with 'v' (got '$TAG')"
            exit 1
          fi
          CARGO_VER=$(grep '^version' crates/gashuu/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "${TAG#v}" != "$CARGO_VER" ]; then
            echo "::error::Tag $TAG (=> ${TAG#v}) does not match crates/gashuu/Cargo.toml version $CARGO_VER"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version gate OK: $TAG matches Cargo.toml $CARGO_VER"

  build-macos:
    name: build (macOS universal)
    needs: preflight
    runs-on: macos-latest
    env:
      TAG: ${{ needs.preflight.outputs.tag }}
      # SYSTEM_DEPS_* overrides point dav1d-sys at the fat static archive,
      # bypassing pkg-config. Job-level because TWO steps compile dav1d-sys:
      # "Build both arches" AND the cargo-bundle scaffold build inside
      # "Bundle .app and splice in the universal binary" (step-local env on the
      # former alone made the bundle step fall back to pkg-config and fail).
      SYSTEM_DEPS_DAV1D_NO_PKG_CONFIG: '1'
      SYSTEM_DEPS_DAV1D_LINK: static
      SYSTEM_DEPS_DAV1D_LIB: dav1d
      SYSTEM_DEPS_DAV1D_SEARCH_NATIVE: /tmp/dav1d-universal/lib
      SYSTEM_DEPS_DAV1D_INCLUDE: /tmp/dav1d-universal/include
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-macos
          save-if: 'true'
      # Both arch slices are needed for the universal (fat) binary.
      - run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      # cargo-bundle is not a CI tool (kept out of mise.toml so the CI app matrix
      # stays lean); install it here only, on the release runner.
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked --version 0.11.0
      # dav1d (AVIF decode) is linked STATICALLY into the release binary so the
      # .app stays self-contained (no bundled dylib, no end-user install). brew
      # ships no static archive, so build dav1d from source for each arch and
      # lipo the two static archives into one fat libdav1d.a. nasm assembles the
      # x86_64 SIMD paths fine on the arm64 host (it is an x86-family assembler).
      - name: Install dav1d build tools (meson/ninja/nasm)
        run: brew install meson ninja nasm
      - name: Build dav1d static (both arches) and lipo
        run: |
          git clone --branch 1.5.3 --depth 1 https://github.com/videolan/dav1d.git /tmp/dav1d-src
          # Native arm64 static build.
          meson setup /tmp/dav1d-build-arm64 /tmp/dav1d-src \
            --default-library=static --buildtype=release \
            -Denable_tools=false -Denable_tests=false \
            --prefix=/tmp/dav1d-arm64
          meson compile -C /tmp/dav1d-build-arm64
          meson install -C /tmp/dav1d-build-arm64
          # Cross x86_64 static build. meson detects the HOST arch unless a
          # cross-file pins cpu_family (CFLAGS alone would not switch its
          # per-arch asm selection).
          cat > /tmp/x86_64-darwin-cross.txt <<'EOF'
          [binaries]
          c = 'clang'
          ar = 'ar'
          strip = 'strip'

          [built-in options]
          c_args = ['-arch', 'x86_64']
          c_link_args = ['-arch', 'x86_64']

          [host_machine]
          system = 'darwin'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF
          meson setup /tmp/dav1d-build-x86_64 /tmp/dav1d-src \
            --default-library=static --buildtype=release \
            -Denable_tools=false -Denable_tests=false \
            --prefix=/tmp/dav1d-x86_64 \
            --cross-file /tmp/x86_64-darwin-cross.txt
          meson compile -C /tmp/dav1d-build-x86_64
          meson install -C /tmp/dav1d-build-x86_64
          # Fat static archive + arch-neutral headers under one prefix.
          mkdir -p /tmp/dav1d-universal/lib
          lipo -create -output /tmp/dav1d-universal/lib/libdav1d.a \
            /tmp/dav1d-arm64/lib/libdav1d.a /tmp/dav1d-x86_64/lib/libdav1d.a
          lipo -info /tmp/dav1d-universal/lib/libdav1d.a
          cp -R /tmp/dav1d-arm64/include /tmp/dav1d-universal/include
      - name: Build both arches
        # dav1d-sys resolution comes from the job-level SYSTEM_DEPS_* env; the
        # linker picks the right slice per target from the fat archive.
        run: |
          cargo build --release --target aarch64-apple-darwin -p gashuu
          cargo build --release --target x86_64-apple-darwin  -p gashuu
      - name: Verify dav1d linked statically (no dylib reference in either slice)
        run: |
          for slice in target/aarch64-apple-darwin/release/gashuu target/x86_64-apple-darwin/release/gashuu; do
            if otool -L "$slice" | grep -i dav1d; then
              echo "::error::$slice dynamically links dav1d — expected static"
              exit 1
            fi
          done
          echo "Static-link audit passed."
      - name: Lipo into a universal binary
        run: |
          mkdir -p target/universal
          lipo -create -output target/universal/gashuu \
            target/aarch64-apple-darwin/release/gashuu \
            target/x86_64-apple-darwin/release/gashuu
          lipo -info target/universal/gashuu
      # cargo-bundle has no --target universal support: build the .app scaffold
      # (Info.plist + .icns + dir structure, arch-neutral) then splice the fat
      # binary into Contents/MacOS. cargo-bundle must run from the crate root.
      - name: Bundle .app and splice in the universal binary
        run: |
          ( cd crates/gashuu && cargo bundle --release )
          # cargo-bundle's workspace handling is imperfect (burtonageo/cargo-bundle#42):
          # the .app may land in the shared workspace target dir OR the crate-local
          # one. Accept either, then export the resolved path for the zip step.
          APP="target/release/bundle/osx/gashuu.app"
          [ -d "$APP" ] || APP="crates/gashuu/target/release/bundle/osx/gashuu.app"
          test -d "$APP" || { echo "::error::cargo-bundle did not emit gashuu.app under target/ or crates/gashuu/target/"; exit 1; }
          cp target/universal/gashuu "$APP/Contents/MacOS/gashuu"
          chmod +x "$APP/Contents/MacOS/gashuu"
          echo "APP=$APP" >> "$GITHUB_ENV"
      # ── SIGNING SEAM (macOS) ──────────────────────────────────────────────
      # To sign + notarize later, insert steps HERE (before the ditto zip):
      #   secrets: MACOS_CERTIFICATE (base64 .p12), MACOS_CERTIFICATE_PWD,
      #            MACOS_CERTIFICATE_NAME ("Developer ID Application: … (TEAMID)"),
      #            MACOS_CI_KEYCHAIN_PWD, MACOS_NOTARIZATION_APPLE_ID/PWD/TEAM_ID
      #   1. import the .p12 into a temporary keychain
      #   2. codesign --force --options runtime --sign "$MACOS_CERTIFICATE_NAME" "$APP"
      #   3. ditto the zip, then `xcrun notarytool submit <zip> --wait`
      #      and `xcrun stapler staple "$APP"`, then re-run ditto on the stapled app.
      - name: Zip the .app (ditto preserves symlinks + permissions)
        run: |
          ditto -c -k --keepParent \
            "$APP" \
            "gashuu-${TAG}-macos-universal.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-zip
          path: gashuu-${{ env.TAG }}-macos-universal.zip
          if-no-files-found: error

  build-windows:
    name: build (Windows x86_64)
    needs: preflight
    runs-on: windows-latest
    env:
      TAG: ${{ needs.preflight.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-windows
          save-if: 'true'
      # dav1d (AVIF decode), built static by vcpkg (preinstalled on the runner)
      # so gashuu.exe stays self-contained — no DLL ships beside the zipped exe.
      # The archives cache turns the ~5-8 min cold source build into seconds.
      - name: Cache vcpkg-built dav1d
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-dav1d-x64-windows-static-md
      - name: Install dav1d (vcpkg, static)
        shell: pwsh
        run: |
          vcpkg install dav1d:x64-windows-static-md
          $root = "$Env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          @(
            "SYSTEM_DEPS_DAV1D_NO_PKG_CONFIG=1",
            "SYSTEM_DEPS_DAV1D_LINK=static",
            "SYSTEM_DEPS_DAV1D_LIB=dav1d",
            "SYSTEM_DEPS_DAV1D_SEARCH_NATIVE=$root\lib",
            "SYSTEM_DEPS_DAV1D_INCLUDE=$root\include"
          ) | Out-File -FilePath $Env:GITHUB_ENV -Append
      # ImageMagick (magick) is preinstalled on the windows-latest runner image.
      # Generate the .ico from the committed PNG so build.rs (winresource) embeds
      # it into gashuu.exe. The .ico is a build artifact, not committed.
      - name: Generate app-icon.ico from app-icon.png
        shell: pwsh
        run: |
          magick crates/gashuu/ui/assets/app-icon.png `
            -define icon:auto-resize="256,128,64,48,32,16" `
            crates/gashuu/ui/assets/app-icon.ico
      - name: Build release binary (build.rs embeds the .ico)
        run: cargo build --release -p gashuu
      - name: Verify gashuu.exe has no dav1d DLL dependency
        shell: pwsh
        run: |
          $vsRoot = & "${Env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $dumpbin = Get-ChildItem "$vsRoot\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Select-Object -First 1
          $deps = & $dumpbin.FullName /dependents target\release\gashuu.exe
          if ($deps -match "dav1d") {
            Write-Error "gashuu.exe depends on a dav1d DLL - expected static link"
            exit 1
          }
          Write-Output "dumpbin check passed - dav1d is statically linked."
      # ── SIGNING SEAM (Windows) ────────────────────────────────────────────
      # To Authenticode-sign later, insert a step HERE (before the zip):
      #   secrets: WIN_CERTIFICATE (base64 .pfx), WIN_CERT_PWD, WIN_CERT_THUMBPRINT
      #   signtool sign /sha1 <thumbprint> /fd SHA256 /tr <timestamp-url> /td SHA256 target\release\gashuu.exe
      - name: Zip the .exe
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/gashuu.exe `
            -DestinationPath "gashuu-$env:TAG-windows-x64.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-zip
          path: gashuu-${{ env.TAG }}-windows-x64.zip
          if-no-files-found: error

  publish:
    name: publish (attach to release)
    permissions:
      contents: write
    needs: [preflight, build-macos, build-windows]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.preflight.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          find artifacts -type f -name '*.zip' -print0 \
            | sort -z \
            | while IFS= read -r -d '' path; do
                sha256sum "$path" | sed 's#  .*/#  #'
              done > SHA256SUMS
          cat SHA256SUMS
      - name: Verify the release exists, then upload assets
        shell: bash
        run: |
          gh release view "$TAG" >/dev/null 2>&1 \
            || { echo "::error::No GitHub Release found for $TAG. Create it first: gh release create $TAG --title $TAG --notes ..."; exit 1; }
          gh release upload "$TAG" SHA256SUMS --clobber
          find artifacts -type f -name '*.zip' -print0 \
            | while IFS= read -r -d '' path; do
                echo "Uploading: $path"
                gh release upload "$TAG" "$path" --clobber
              done
