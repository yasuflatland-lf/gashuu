name: Release

# Build the macOS (universal) and Windows (x86_64) executables plus the Linux
# (x86_64) installers — an AppImage and a .deb — and attach them to the GitHub
# Release for the tag. The Release must already exist
# (create it first via the GitHub UI or `gh release create <tag> ...`); this
# workflow only uploads assets to it, it does not create the release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach assets to (e.g. v0.1.0)'
        required: true
        type: string

# Do NOT cancel an in-progress release — re-triggering mid-run could leave a
# release with a partial set of assets.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Default all release jobs to read-only; only publish needs write access.
permissions:
  contents: read

jobs:
  # Fail fast (before any minutes are spent on the slow per-OS builds) if the
  # tag does not match the crate version, so a mistyped tag never ships.
  preflight:
    name: preflight (version gate)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - id: resolve
        name: Resolve the tag and assert it matches Cargo.toml
        shell: bash
        env:
          # Pass interpolated values through env (never inline into the script).
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          # Require the `v` prefix so a bare `0.1.0` dispatch can't pass the gate
          # and then fail later at `gh release view v0.1.0`.
          if [ "${TAG#v}" = "$TAG" ]; then
            echo "::error::Tag must start with 'v' (got '$TAG')"
            exit 1
          fi
          CARGO_VER=$(grep '^version' crates/gashuu/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "${TAG#v}" != "$CARGO_VER" ]; then
            echo "::error::Tag $TAG (=> ${TAG#v}) does not match crates/gashuu/Cargo.toml version $CARGO_VER"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version gate OK: $TAG matches Cargo.toml $CARGO_VER"

  build-macos:
    name: build (macOS universal)
    needs: preflight
    runs-on: macos-latest
    env:
      TAG: ${{ needs.preflight.outputs.tag }}
      # SYSTEM_DEPS_* overrides point dav1d-sys at the fat static archive,
      # bypassing pkg-config. Job-level because TWO steps compile dav1d-sys:
      # "Build both arches" AND the cargo-bundle scaffold build inside
      # "Bundle .app and splice in the universal binary" (step-local env on the
      # former alone made the bundle step fall back to pkg-config and fail).
      SYSTEM_DEPS_DAV1D_NO_PKG_CONFIG: '1'
      SYSTEM_DEPS_DAV1D_LINK: static
      SYSTEM_DEPS_DAV1D_LIB: dav1d
      SYSTEM_DEPS_DAV1D_SEARCH_NATIVE: /tmp/dav1d-universal/lib
      SYSTEM_DEPS_DAV1D_INCLUDE: /tmp/dav1d-universal/include
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-macos
          save-if: 'true'
      # Both arch slices are needed for the universal (fat) binary.
      - run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      # cargo-bundle is not a CI tool (kept out of mise.toml so the CI app matrix
      # stays lean); install it here only, on the release runner.
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked --version 0.11.0
      # dav1d (AVIF decode) is linked STATICALLY into the release binary so the
      # .app stays self-contained (no bundled dylib, no end-user install). brew
      # ships no static archive, so build dav1d from source for each arch and
      # lipo the two static archives into one fat libdav1d.a. nasm assembles the
      # x86_64 SIMD paths fine on the arm64 host (it is an x86-family assembler).
      - name: Install dav1d build tools (meson/ninja/nasm)
        run: brew install meson ninja nasm
      - name: Build dav1d static (both arches) and lipo
        run: |
          git clone --branch 1.5.3 --depth 1 https://github.com/videolan/dav1d.git /tmp/dav1d-src
          # Native arm64 static build.
          meson setup /tmp/dav1d-build-arm64 /tmp/dav1d-src \
            --default-library=static --buildtype=release \
            -Denable_tools=false -Denable_tests=false \
            --prefix=/tmp/dav1d-arm64
          meson compile -C /tmp/dav1d-build-arm64
          meson install -C /tmp/dav1d-build-arm64
          # Cross x86_64 static build. meson detects the HOST arch unless a
          # cross-file pins cpu_family (CFLAGS alone would not switch its
          # per-arch asm selection).
          cat > /tmp/x86_64-darwin-cross.txt <<'EOF'
          [binaries]
          c = 'clang'
          ar = 'ar'
          strip = 'strip'

          [built-in options]
          c_args = ['-arch', 'x86_64']
          c_link_args = ['-arch', 'x86_64']

          [host_machine]
          system = 'darwin'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF
          meson setup /tmp/dav1d-build-x86_64 /tmp/dav1d-src \
            --default-library=static --buildtype=release \
            -Denable_tools=false -Denable_tests=false \
            --prefix=/tmp/dav1d-x86_64 \
            --cross-file /tmp/x86_64-darwin-cross.txt
          meson compile -C /tmp/dav1d-build-x86_64
          meson install -C /tmp/dav1d-build-x86_64
          # Fat static archive + arch-neutral headers under one prefix.
          mkdir -p /tmp/dav1d-universal/lib
          lipo -create -output /tmp/dav1d-universal/lib/libdav1d.a \
            /tmp/dav1d-arm64/lib/libdav1d.a /tmp/dav1d-x86_64/lib/libdav1d.a
          lipo -info /tmp/dav1d-universal/lib/libdav1d.a
          cp -R /tmp/dav1d-arm64/include /tmp/dav1d-universal/include
      - name: Build both arches
        # dav1d-sys resolution comes from the job-level SYSTEM_DEPS_* env; the
        # linker picks the right slice per target from the fat archive.
        run: |
          cargo build --release --target aarch64-apple-darwin -p gashuu
          cargo build --release --target x86_64-apple-darwin  -p gashuu
      - name: Verify dav1d linked statically (no dylib reference in either slice)
        run: |
          for slice in target/aarch64-apple-darwin/release/gashuu target/x86_64-apple-darwin/release/gashuu; do
            if otool -L "$slice" | grep -i dav1d; then
              echo "::error::$slice dynamically links dav1d — expected static"
              exit 1
            fi
          done
          echo "Static-link audit passed."
      - name: Lipo into a universal binary
        run: |
          mkdir -p target/universal
          lipo -create -output target/universal/gashuu \
            target/aarch64-apple-darwin/release/gashuu \
            target/x86_64-apple-darwin/release/gashuu
          lipo -info target/universal/gashuu
      # cargo-bundle has no --target universal support: build the .app scaffold
      # (Info.plist + .icns + dir structure, arch-neutral) then splice the fat
      # binary into Contents/MacOS. cargo-bundle must run from the crate root.
      - name: Bundle .app and splice in the universal binary
        run: |
          ( cd crates/gashuu && cargo bundle --release )
          # cargo-bundle's workspace handling is imperfect (burtonageo/cargo-bundle#42):
          # the .app may land in the shared workspace target dir OR the crate-local
          # one. Accept either, then export the resolved path for the zip step.
          APP="target/release/bundle/osx/gashuu.app"
          [ -d "$APP" ] || APP="crates/gashuu/target/release/bundle/osx/gashuu.app"
          test -d "$APP" || { echo "::error::cargo-bundle did not emit gashuu.app under target/ or crates/gashuu/target/"; exit 1; }
          cp target/universal/gashuu "$APP/Contents/MacOS/gashuu"
          chmod +x "$APP/Contents/MacOS/gashuu"
          echo "APP=$APP" >> "$GITHUB_ENV"
      # ── Ad-hoc code signing (self-signed) ─────────────────────────────────
      # Splicing the universal binary invalidates any signature cargo-bundle's
      # scaffold build produced. Re-seal the bundle with an ad-hoc signature
      # (identity "-"): no certificate, Apple account, or secret required. This
      # does NOT clear Gatekeeper (only Developer ID + notarization does), but it
      # gives the lipo'd binary a valid signature so it launches reliably on
      # Apple Silicon, and is the foundation a future notarization step needs.
      #
      # To upgrade to Developer ID + notarization later, swap the ad-hoc "-" for
      # "$MACOS_CERTIFICATE_NAME" (a .p12 secret imported into a temp keychain),
      # add --options runtime, then `xcrun notarytool submit <zip> --wait` and
      # `xcrun stapler staple "$APP"` before the distribution stage below.
      - name: Ad-hoc codesign the .app (self-signed)
        run: |
          codesign --force --sign - "$APP"
          codesign --verify --strict --verbose=2 "$APP"
          echo "Ad-hoc signature applied and verified."
      - name: Stage and zip the macOS distribution
        run: |
          STAGE="target/release/macos-dist/gashuu-${TAG}-macos-universal"
          rm -rf "target/release/macos-dist"
          mkdir -p "$STAGE"

          ditto "$APP" "$STAGE/gashuu.app"

          cat > "$STAGE/README-macOS.txt" <<'EOF'
          gashuu for macOS

          This macOS build is ad-hoc signed (self-signed) but not notarized by Apple.

          Recommended install steps:

          1. Move gashuu.app to the Applications folder.
          2. Try opening gashuu.app normally and accept the error dialog.
          3. Open System Settings > Privacy & Security.
          4. Scroll down to the Security section. You will see a message that gashuu was blocked.
          5. Click "Open Anyway" and enter your Mac's password.

          This is a temporary workaround until Developer ID signing and notarization are added.
          EOF

          ditto -c -k --keepParent \
            "$STAGE" \
            "gashuu-${TAG}-macos-universal.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-zip
          path: gashuu-${{ env.TAG }}-macos-universal.zip
          if-no-files-found: error

  build-linux:
    name: build (Linux x86_64)
    needs: preflight
    # Build on the OLDEST supported Ubuntu (not ubuntu-latest) so the AppImage
    # and .deb link against an older glibc and therefore install on a wider
    # range of distros. CI feature-testing stays on ubuntu-latest; the older
    # runner is a release-only choice for binary portability.
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ needs.preflight.outputs.tag }}
      # dav1d (AVIF decode) is linked STATICALLY here, as on macOS/Windows.
      # ubuntu-22.04's apt ships dav1d 0.9.2, far below dav1d-sys's `>= 1.3.0`
      # floor, so a current dav1d is built from source (below) and dav1d-sys is
      # pointed at the static archive, bypassing pkg-config. Job-level so the
      # single dav1d-sys compile in "Build release binary" sees it (cargo-deb
      # reuses that binary via --no-build).
      SYSTEM_DEPS_DAV1D_NO_PKG_CONFIG: '1'
      SYSTEM_DEPS_DAV1D_LINK: static
      SYSTEM_DEPS_DAV1D_LIB: dav1d
      SYSTEM_DEPS_DAV1D_SEARCH_NATIVE: /tmp/dav1d/lib
      SYSTEM_DEPS_DAV1D_INCLUDE: /tmp/dav1d/include
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-linux
          save-if: 'true'
      # Slint's winit + femtovg backend links these system libraries on Linux.
      # meson/ninja/nasm build dav1d from source (next step); `file` is required
      # by linuxdeploy/appimagetool.
      - name: Install system libraries + dav1d build tools (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libfreetype6-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            meson ninja-build nasm file
      # Build a current dav1d as a STATIC archive (apt's 0.9.2 is too old, see the
      # SYSTEM_DEPS_* note above). Pinned to the same 1.5.3 the macOS job uses so
      # the AVIF decoder is identical across platforms. meson's default
      # b_staticpic=true yields a PIC archive that links into the PIE release
      # binary; --libdir=lib keeps the archive at the path SYSTEM_DEPS expects.
      - name: Build dav1d static (from source)
        run: |
          git clone --branch 1.5.3 --depth 1 https://github.com/videolan/dav1d.git /tmp/dav1d-src
          meson setup /tmp/dav1d-build /tmp/dav1d-src \
            --default-library=static --buildtype=release --libdir=lib \
            -Denable_tools=false -Denable_tests=false \
            --prefix=/tmp/dav1d
          meson compile -C /tmp/dav1d-build
          meson install -C /tmp/dav1d-build
      - name: Build release binary
        # dav1d-sys resolution comes from the job-level SYSTEM_DEPS_* env.
        run: cargo build --release -p gashuu
      # Confirm dav1d is baked in: a dynamic libdav1d.so reference would mean the
      # static link silently fell through to a system library that ships nowhere.
      - name: Verify dav1d linked statically (no dav1d in ldd output)
        run: |
          if ldd target/release/gashuu | grep -i dav1d; then
            echo "::error::target/release/gashuu dynamically links dav1d — expected static"
            exit 1
          fi
          echo "Static-link audit passed."
      # ── .deb (cargo-deb) ──────────────────────────────────────────────────
      # cargo-deb is a release-only tool (kept out of mise.toml so the CI app
      # matrix stays lean); install it here on the release runner. `--locked`
      # builds it from its own bundled lockfile for a reproducible install
      # without pinning a patch version that would rot. `--no-build` reuses the
      # binary built above; runtime deps come from [package.metadata.deb]
      # depends="$auto" (dpkg-shlibdeps reads the dynamically linked .so set).
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build the .deb
        run: |
          cargo deb -p gashuu --no-build --output "gashuu-${TAG}-amd64.deb"
          ls -l "gashuu-${TAG}-amd64.deb"
      # ── AppImage (linuxdeploy) ────────────────────────────────────────────
      # linuxdeploy builds the AppDir from the binary, .desktop, and icon, copies
      # in the dynamically linked shared libs (fontconfig/freetype/xcb/xkbcommon;
      # dav1d is static, so it is not among them), and the appimage plugin seals
      # it into a single portable file.
      - name: Build the AppImage
        env:
          # GitHub runners cannot reliably mount FUSE; tell the linuxdeploy and
          # appimagetool AppImages to self-extract instead of FUSE-mounting.
          APPIMAGE_EXTRACT_AND_RUN: '1'
          # linuxdeploy-plugin-appimage reads OUTPUT for the final filename.
          OUTPUT: gashuu-${{ needs.preflight.outputs.tag }}-x86_64.AppImage
        run: |
          # The .desktop declares Icon=gashuu, so the icon file's basename must
          # be gashuu.png for linuxdeploy to wire it up.
          cp crates/gashuu/ui/assets/app-icon.png gashuu.png
          base=https://github.com/linuxdeploy
          curl -fsSL -o linuxdeploy \
            "$base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          curl -fsSL -o linuxdeploy-plugin-appimage \
            "$base/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-appimage
          # linuxdeploy discovers the appimage plugin on PATH.
          export PATH="$PWD:$PATH"

          linuxdeploy --appdir AppDir \
            --executable target/release/gashuu \
            --desktop-file crates/gashuu/packaging/linux/gashuu.desktop \
            --icon-file gashuu.png \
            --output appimage
          # Fall back to renaming if the plugin ignored OUTPUT.
          [ -f "$OUTPUT" ] || mv gashuu*.AppImage "$OUTPUT"
          ls -l "$OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-installers
          path: |
            gashuu-${{ env.TAG }}-amd64.deb
            gashuu-${{ env.TAG }}-x86_64.AppImage
          if-no-files-found: error

  build-windows:
    name: build (Windows x86_64)
    needs: preflight
    runs-on: windows-latest
    env:
      TAG: ${{ needs.preflight.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-windows
          save-if: 'true'
      # dav1d (AVIF decode), built static by vcpkg (preinstalled on the runner)
      # so gashuu.exe stays self-contained — no DLL ships beside the zipped exe.
      # The archives cache turns the ~5-8 min cold source build into seconds.
      - name: Cache vcpkg-built dav1d
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-dav1d-x64-windows-static-md
      - name: Install dav1d (vcpkg, static)
        shell: pwsh
        run: |
          vcpkg install dav1d:x64-windows-static-md
          $root = "$Env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          @(
            "SYSTEM_DEPS_DAV1D_NO_PKG_CONFIG=1",
            "SYSTEM_DEPS_DAV1D_LINK=static",
            "SYSTEM_DEPS_DAV1D_LIB=dav1d",
            "SYSTEM_DEPS_DAV1D_SEARCH_NATIVE=$root\lib",
            "SYSTEM_DEPS_DAV1D_INCLUDE=$root\include"
          ) | Out-File -FilePath $Env:GITHUB_ENV -Append
      # ImageMagick (magick) is preinstalled on the windows-latest runner image.
      # Generate the .ico from the committed PNG so build.rs (winresource) embeds
      # it into gashuu.exe. The .ico is a build artifact, not committed.
      - name: Generate app-icon.ico from app-icon.png
        shell: pwsh
        run: |
          magick crates/gashuu/ui/assets/app-icon.png `
            -define icon:auto-resize="256,128,64,48,32,16" `
            crates/gashuu/ui/assets/app-icon.ico
      - name: Build release binary (build.rs embeds the .ico)
        run: cargo build --release -p gashuu
      - name: Verify gashuu.exe has no dav1d DLL dependency
        shell: pwsh
        run: |
          $vsRoot = & "${Env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $dumpbin = Get-ChildItem "$vsRoot\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Select-Object -First 1
          $deps = & $dumpbin.FullName /dependents target\release\gashuu.exe
          if ($deps -match "dav1d") {
            Write-Error "gashuu.exe depends on a dav1d DLL - expected static link"
            exit 1
          }
          Write-Output "dumpbin check passed - dav1d is statically linked."
      # ── SIGNING SEAM (Windows) ────────────────────────────────────────────
      # To Authenticode-sign later, insert a step HERE (before the zip):
      #   secrets: WIN_CERTIFICATE (base64 .pfx), WIN_CERT_PWD, WIN_CERT_THUMBPRINT
      #   signtool sign /sha1 <thumbprint> /fd SHA256 /tr <timestamp-url> /td SHA256 target\release\gashuu.exe
      - name: Zip the .exe
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/gashuu.exe `
            -DestinationPath "gashuu-$env:TAG-windows-x64.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-zip
          path: gashuu-${{ env.TAG }}-windows-x64.zip
          if-no-files-found: error

  publish:
    name: publish (attach to release)
    permissions:
      contents: write
    needs: [preflight, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.preflight.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          find artifacts -type f \( -name '*.zip' -o -name '*.deb' -o -name '*.AppImage' \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' path; do
                sha256sum "$path" | sed 's#  .*/#  #'
              done > SHA256SUMS
          cat SHA256SUMS
      - name: Verify the release exists, then upload assets
        shell: bash
        run: |
          gh release view "$TAG" >/dev/null 2>&1 \
            || { echo "::error::No GitHub Release found for $TAG. Create it first: gh release create $TAG --title $TAG --notes ..."; exit 1; }
          gh release upload "$TAG" SHA256SUMS --clobber
          find artifacts -type f \( -name '*.zip' -o -name '*.deb' -o -name '*.AppImage' \) -print0 \
            | while IFS= read -r -d '' path; do
                echo "Uploading: $path"
                gh release upload "$TAG" "$path" --clobber
              done
