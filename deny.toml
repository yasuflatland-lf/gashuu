[advisories]
version = 2
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "paste (unmaintained, no patched version) is pulled by rav1e -> ravif -> image. It is NOT in our runtime image: gashuu-core builds image WITHOUT the avif ENCODE feature, so the shipped binary no longer links rav1e. paste remains ONLY because i-slint-compiler (Slint's build-time .slint compiler / proc-macro) depends on image with its DEFAULT features, which enable the avif encoder — outside gashuu's control. Trimming gashuu's own image features does NOT remove it. Remove once Slint's compiler stops enabling image/avif (or image drops the ravif encoder)." },
  { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 is unmaintained, used transitively by i18n-embed-fl; no safe upgrade is available. Remove once i18n-embed-fl drops this dependency." },
  { id = "RUSTSEC-2026-0192", reason = "ttf-parser is unmaintained, pulled in transitively via Slint (usvg -> resvg -> fontdb) and winit (sctk-adwaita -> ab_glyph -> owned_ttf_parser); no safe upgrade is available. Remove once Slint and winit migrate off ttf-parser (e.g. to skrifa)." },
  { id = "RUSTSEC-2026-0206", reason = "rustybuzz is unmaintained, pulled in transitively via Slint (usvg -> resvg -> rustybuzz) for text shaping at render/build time; no safe upgrade is available (upstream alternative is harfrust). Same subtree as RUSTSEC-2026-0192. Remove once Slint/resvg migrate off rustybuzz." },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
