  { id = "RUSTSEC-2024-0436", reason = "paste is a transitive dependency of the AVIF stack (rav1e -> ravif -> image); the advisory is informational/unmaintained and has no patched version. Remove this once `cargo tree -i paste --locked` no longer finds paste." },
